<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咻咻猫的 16-bit 智能猫窝</title>
    <style>
        /* 全局复古游戏机风格 */
        body {
            background-color: #2c211a;
            font-family: "Courier New", Courier, monospace, "Microsoft YaHei";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
            user-select: none;
        }

        #game-console {
            width: 420px;
            background: #ab825f; 
            border: 6px solid #4e3522;
            border-radius: 16px;
            box-shadow: 0 12px 0 #2c1c11, 0 20px 30px rgba(0,0,0,0.6);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* 浅粉色纯色渐变背景 */
        #game-screen {
            background: linear-gradient(to bottom, #ffe4eb, #fbc4d0); 
            border: 6px solid #4e3522;
            border-radius: 8px;
            height: 280px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(188,120,135,0.4);
        }

        /* CRT 显像管扫描线效果 */
        #game-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 5;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
        }

        /* 状态面板 */
        #status-bars {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .bar-container {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 0px #4e3522, -1px -1px 0px #4e3522, 1px -1px 0px #4e3522, -1px 1px 0px #4e3522;
        }

        .bar-label {
            display: flex;
            align-items: center;
            gap: 6px;                
            white-space: nowrap;     
            min-width: 65px;         
            margin-right: 5px;       
        }
        
        .pixel-bar-bg {
            width: 90px;
            height: 14px;
            background: #e9ced5;
            border: 3px solid #4e3522;
        }

        .pixel-bar-fill {
            height: 100%;
            width: 60%;
            transition: width 0.3s, background-color 0.5s;
        }

        /* 精灵图容器 */
        #sprite-container {
            position: absolute;
            bottom: 10px;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sprite-container.tsundere-ignore {
            transform: scaleX(-1);
        }

        /* 四种情绪姿态的 16-bit 像素动画系统 */
        #sprite-container.state-normal svg.cat-sprite {
            animation: breathe-normal 3.5s infinite ease-in-out;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-normal {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.03, 0.97) translateY(2px); }
        }

        #sprite-container.state-sleepy svg.cat-sprite {
            animation: breathe-sleepy 5s infinite ease-in-out;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-sleepy {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.01, 0.99) translateY(1px); }
        }

        #sprite-container.state-angry svg.cat-sprite {
            animation: breathe-angry 1.5s infinite ease-in-out, shake-angry 0.15s infinite alternate;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-angry {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.04, 0.96) translateY(2px); }
        }
        @keyframes shake-angry {
            0% { transform: translate(-1px, 0) rotate(-0.5deg); }
            100% { transform: translate(1px, 0) rotate(0.5deg); }
        }

        #sprite-container.state-happy svg.cat-sprite {
            animation: breathe-happy 2s infinite ease-in-out, bounce-happy 1s infinite alternate;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-happy {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05, 0.95) translateY(1px); }
        }
        @keyframes bounce-happy {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); } 
        }

        /* 重置所有表情图层 */
        .eye-sleepy, .eye-angry, .eyebrow-angry, .eye-happy, 
        .ear-sleepy, .ear-angry, .blush-happy {
            display: none !important;
        }

        /* 表情状态控制 */
        #sprite-container.state-sleepy .eye-sleepy,
        #sprite-container.state-sleepy .ear-sleepy { display: inline !important; }
        #sprite-container.state-sleepy .eye-open,
        #sprite-container.state-sleepy .eye-open-pupil,
        #sprite-container.state-sleepy .ear-normal { display: none !important; }

        #sprite-container.state-angry .eye-angry,
        #sprite-container.state-angry .eyebrow-angry,
        #sprite-container.state-angry .ear-angry { display: inline !important; }
        #sprite-container.state-angry .eye-open,
        #sprite-container.state-angry .eye-open-pupil,
        #sprite-container.state-angry .ear-normal { display: none !important; }

        #sprite-container.state-happy .eye-happy,
        #sprite-container.state-happy .blush-happy { display: inline !important; }
        #sprite-container.state-happy .eye-open,
        #sprite-container.state-happy .eye-open-pupil { display: none !important; }

        /* 对话框布局 */
        #dialogue-box {
            background: #1a1512;
            border: 4px solid #fff;
            outline: 2px solid #1a1512;
            border-radius: 4px;
            height: 110px;
            padding: 8px 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 2px;
            cursor: pointer; /* 允许点击跳过打字效果 */
        }

        #speaker {
            font-size: 11px;
            color: #ff99bb; 
            font-weight: bold;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        /* 对话栏内容 */
        #text-content {
            font-size: 13px;
            line-height: 1.4;
            color: #ffd1dc; 
            overflow-y: auto; 
            flex-grow: 1;
        }

        #text-content::-webkit-scrollbar {
            width: 6px;
        }
        #text-content::-webkit-scrollbar-track {
            background: #1a1512;
        }
        #text-content::-webkit-scrollbar-thumb {
            background: #ab825f;
            border: 1px solid #4e3522;
            border-radius: 2px;
        }

        /* 16-bit 物理重力粒子动画 */
        .drop-particle {
            position: absolute;
            font-size: 22px;
            pointer-events: none;
            z-index: 100;
            animation: fallDown 1.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fallDown {
            0% {
                transform: translateY(-40px) rotate(0deg) scale(0.6);
                opacity: 0;
            }
            15% {
                opacity: 1;
                transform: translateY(10px) rotate(45deg) scale(1.1);
            }
            85% {
                opacity: 1;
            }
            100% {
                transform: translateY(220px) rotate(360deg) scale(0.8);
                opacity: 0;
            }
        }

        #buttons-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .pixel-btn {
            background: #e29bb2; 
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #3b1d27;
            font-size: 11px;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: inset -2px -2px 0px #b06e83, 2px 2px 0px #4e3522;
            outline: none;
        }

        .pixel-btn:active:not(:disabled) {
            box-shadow: inset 2px 2px 0px #b06e83;
            transform: translate(1px, 1px);
        }

        .pixel-btn:disabled {
            background: #a0828c !important;
            border-color: #5a4b40 !important;
            color: #605058 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }

        #btn-poke {
            background: #84bbf0;
            border-color: #2b4562;
            box-shadow: inset -2px -2px 0px #508cb5, 2px 2px 0px #2b4562;
            color: #fff;
        }

        #chat-input-area {
            display: flex;
            gap: 6px;
        }

        #chat-input {
            flex: 1;
            background: #1a1512;
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #fff;
            padding: 8px;
            font-size: 12px;
            outline: none;
        }

        #chat-submit {
            background: #e8517b;
            color: white;
            border: 3px solid #a62a4d;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

        <!-- 对话框 -->
        <div id="dialogue-box" onclick="skipTypewriting()">
            <div id="speaker">咻咻猫</div>
            <div id="text-content"></div>
        </div>

        <!-- 交互按钮 -->
        <div id="buttons-panel">
            <button class="pixel-btn" id="btn-feed" onclick="interact('feed')">🐟 喂鱼干</button>
            <button class="pixel-btn" id="btn-pet" onclick="interact('pet')">✋ 摸摸头</button>
            <button class="pixel-btn" id="btn-play" onclick="interact('play')">🌿 逗猫棒</button>
            <button class="pixel-btn" id="btn-poke" onclick="interact('poke')">👉 戳一戳</button>
        </div>

        <!-- 输入框 -->

            <input type="text" id="chat-input" placeholder="和咻咻猫说点什么..." onkeydown="if(event.key === 'Enter' || event.keyCode === 13) submitChat()">
            <button id="chat-submit" onclick="submitChat()">发送</button>

    <script>
        // ==========================================
        // ⚙️ 接口配置（如无 Key 则自动切入本地离线算法）
        // ==========================================
        const CONFIG = {
            apiKey: "sk-ephvdecvurhviermvzutqqegqessydmogyjjhlgzghzdxvwz", 
            apiUrl: "https://api.siliconflow.cn/v1", 
            apiModel: "Qwen/Qwen2.5-7B-Instruct" 
        };

        // ==========================================
        // ✍️ 仿游戏 RPG 打字机排版显示引擎
        // ==========================================
        let typewriterTimer = null;
        let currentFullText = "";
        let isWriting = false;

        function renderText(targetId, text, speed = 25) {
            const container = document.getElementById(targetId);
            if (!container) return;

            // 终止上一轮打印
            if (typewriterTimer) {
                clearInterval(typewriterTimer);
            }

            currentFullText = text;
            isWriting = true;
            container.innerText = "";
            
            let index = 0;
            typewriterTimer = setInterval(() => {
                if (index < text.length) {
                    container.innerText += text[index];
                    index++;
                    // 保持滚动条处于最底端
                    container.scrollTop = container.scrollHeight;
                } else {
                    clearInterval(typewriterTimer);
                    isWriting = false;
                }
            }, speed);
        }

        // 允许玩家点击对话框瞬间跳过打字效果，直接展示全文本
        function skipTypewriting() {
            if (isWriting) {
                if (typewriterTimer) clearInterval(typewriterTimer);
                const container = document.getElementById('text-content');
                if (container) {
                    container.innerText = currentFullText;
                    container.scrollTop = container.scrollHeight;
                }
                isWriting = false;
            }
        }

        // ==========================================
        // 🧠 记忆读取存档与平滑向前升级兼容
        // ==========================================
        function loadSavedState() {
            const defaults = {
                hunger: 60,
                affection: 60,
                isIgnoring: false,
                ignoreCount: 0,
                chatHistory: [],
                lastUserEmotion: 'normal'
            };

            try {
                const saved = localStorage.getItem('xiuxiu_pet_state_v8');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    // 自动安全合并参数结构，确保平滑向前兼容
                    return Object.assign({}, defaults, parsed, { isProcessing: false });
                }
            } catch (e) {
                console.error("读取存档失败，系统自动恢复基准参数:", e);
            }
            return defaults;
        }

        // 初始化状态
        const state = loadSavedState();

        // 写入存档
        function saveCurrentState() {
            try {
                const toSave = {
                    hunger: state.hunger,
                    affection: state.affection,
                    isIgnoring: state.isIgnoring,
                    ignoreCount: state.ignoreCount,
                    chatHistory: state.chatHistory,
                    lastUserEmotion: state.lastUserEmotion
                };
                localStorage.setItem('xiuxiu_pet_state_v8', JSON.stringify(toSave));
            } catch (e) {
                console.error("存档写入失败:", e);
            }
        }

        // 🌟 开机随机寄语
        const greetings = [
            "咻呜！小王你终于舍得开机了？[从粉色地板上慢吞吞地爬起来，伸了个懒腰] 本喵等得胡子都歪了！",
            "咻！[傲娇地抬起大圆头，抖了抖红粉色耳心] 别一直盯着本喵看。本喵今天心情好，才勉为其难在这里等你的，小王！",
            "哼，你来啦？[缩成一个巧克力色的大毛球，耳朵轻快地转了转] 肚子好像有点咕噜噜了，小王，你懂我的意思吧？咻呜~",
            "咻！新衣服合身吗？[在浅粉色房间里摇了摇巧克力色的大尾巴] 这次和照片上一模一样了吧！咻呜~",
            "十年了，小王你还是每天这个时间来守着我。[有些不好意思地用白色爪子刨了刨地板] 哼，本喵才没有在特意等你呢！"
        ];

        // 唤醒咻咻
        function wakeupXiuXiu() {
            if (state.chatHistory && state.chatHistory.length > 0) {
                const lastTurn = state.chatHistory[state.chatHistory.length - 1];
                if (lastTurn && lastTurn.role === "assistant") {
                    renderText('text-content', `[接上回] ${lastTurn.content}`);
                    updateVisualState();
                    return;
                }
            }
            const randomIndex = Math.floor(Math.random() * greetings.length);
            renderText('text-content', greetings[randomIndex]);
            updateVisualState();
        }
        wakeupXiuXiu();

        // 情绪动画控制
        function setVisualState(stateName) {
            const container = document.getElementById('sprite-container');
            if (!container) return;
            container.classList.remove('state-normal', 'state-sleepy', 'state-angry', 'state-happy');
            container.classList.add(`state-${stateName}`);
        }

        // 智能状态机：自动检测身体情况决定外在情绪
        function updateVisualState() {
            if (state.hunger < 30 || state.isIgnoring) {
                setVisualState('angry');
                return;
            }
            const hours = new Date().getHours();
            if (hours >= 23 || hours < 5) {
                setVisualState('sleepy');
                return;
            }
            if (state.affection >= 50) {
                setVisualState('happy');
                return;
            }
            setVisualState('normal');
        }

        // 临时情绪反应
        let tempEmotionTimeout = null;
        function triggerTempVisualState(stateName, duration = 2500) {
            if (tempEmotionTimeout) clearTimeout(tempEmotionTimeout);
            setVisualState(stateName);
            tempEmotionTimeout = setTimeout(() => {
                updateVisualState();
            }, duration);
        }

        // 16-bit 像素粒子下落系统
        function createFallingParticles(emojiType) {
            const screen = document.getElementById('game-screen');
            if (!screen) return;
            
            for (let i = 0; i < 6; i++) {
                const particle = document.createElement('div');
                particle.className = 'drop-particle';
                particle.innerText = emojiType;
                
                const randomX = Math.random() * 80 + 10;
                particle.style.left = `${randomX}%`;
                particle.style.top = `0px`; 
                
                const delay = Math.random() * 0.4;
                particle.style.animationDelay = `${delay}s`;
                
                screen.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1500);
            }
        }

        // 获取时间
        function getCurrentDateTimeString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            const dayOfWeek = dayNames[now.getDay()];
            
            let timePeriod = "深夜";
            if (hours >= 5 && hours < 8) timePeriod = "清晨";
            else if (hours >= 8 && hours < 11) timePeriod = "上午";
            else if (hours >= 11 && hours < 13) timePeriod = "中午";
            else if (hours >= 13 && hours < 17) timePeriod = "下午";
            else if (hours >= 17 && hours < 19) timePeriod = "傍晚";
            else if (hours >= 19 && hours < 23) timePeriod = "晚上";

            return `${year}年${month}月${date}日 ${dayOfWeek} ${timePeriod} ${hours}:${minutes}`;
        }

        // 安全清理 Key
        function getStrictCleanKey() {
            if (!CONFIG || typeof CONFIG.apiKey !== 'string') return "";
            return CONFIG.apiKey.replace(/[^A-Za-z0-9\-_]/g, "").trim();
        }

        // 统一控制组件禁用状态
        function setInteractiveState(enabled) {
            state.isProcessing = !enabled;
            
            const buttons = ['btn-feed', 'btn-pet', 'btn-play', 'btn-poke', 'chat-submit'];
            buttons.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = !enabled;
            });

            const inputEl = document.getElementById('chat-input');
            if (inputEl) {
                inputEl.disabled = !enabled;
                if (enabled) {
                    setTimeout(() => inputEl.focus(), 50);
                }
            }
        }

        // 调用大模型
        async function fetchAIResponse(userMessage) {
            const cleanKey = getStrictCleanKey();

            if (!cleanKey || cleanKey.length < 15 || cleanKey.includes("API_KEY")) {
                return localFallbackChat(userMessage);
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000); 

            const messagesPayload = [
                { role: "system", content: getSystemPrompt() },
                ...state.chatHistory 
            ];

            try {
                const response = await fetch(`${CONFIG.apiUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${cleanKey}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.apiModel,
                        messages: messagesPayload,
                        max_tokens: 150,
                        temperature: 0.6 
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`[HTTP ${response.status}] - ${errText}`);
                }
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                clearTimeout(timeoutId);
                console.error("API 报错:", err);
                
                if (err.name === 'AbortError') {
                    return "[信号太弱，咻咻脑电波超时中...] \n" + localFallbackChat(userMessage);
                }
                return `[网络有些堵塞喵...] \n${localFallbackChat(userMessage)}`;
            }
        }

        // 动态构建提示词
        function getSystemPrompt() {
            const timeStr = getCurrentDateTimeString();
            
            let stateDescription = "";
            if (state.affection < 30) {
                stateDescription += `\n- 【当前情感：情感冰点（好感度：${state.affection}/100 < 30）】。你对小王极度冷漠、抗拒，坚决拒绝亲密，说话极其敷衍、冷冰冰。`;
            } else if (state.affection >= 30 && state.affection < 50) {
                stateDescription += `\n- 【当前情感：傲娇防线（好感度：${state.affection}/100 在 30~50 之间）】。你性格极其傲娇（口嫌体正直），虽然依赖小王但嘴硬死不承认，说话别扭，经常数落他。`;
            } else {
                stateDescription += `\n- 【当前情感：极度粘人撒娇（好感度：${state.affection}/100 >= 50）】。你现在对小王卸下了所有防备，变得极其开朗、粘人、温柔又可爱！你会亲昵地用圆脸贴蹭他、甜软撒娇，整只猫甜度拉满。`;
            }

            if (state.hunger < 30) {
                stateDescription += `\n- 【特殊生理状态：极度饥饿（饱食度：${state.hunger}/100 < 30）】。你肚子咕咕叫，频繁催促小王喂你鱼干。`;
            }

            if (state.lastUserEmotion === 'negative') {
                stateDescription += `\n- ⚠️【紧急心境状态：小王目前心情极度低落/烦躁/委屈/劳累】！你在这里必须瞬间放下面子和所有冷漠，语气要变得十分心疼、温柔。虽然还要嘴硬说几句‘哼，本喵才不是担心你呢’，但必须主动深度追问他发生了什么，给予他安全感。`;
            }

            return `你是一只名叫“咻咻猫”的16位像素风电子宠物猫，今年10岁了，是主人“小王”养了十年的巧克力色老猫。
        
        【设定规则】
        1. 语气：说话带“咻”或“咻呜”的尾音。根据当前的【好感度分级】决定你的亲密程度。
        2. 动作描述：把你的神态、小动作描写放在方括号 [] 里（例如：[亲昵地用巧克力色的脸颊蹭了蹭小王的手，高兴地咪起眼]）。
        3. 格式要求：直接输出台词，绝对不要输出前缀（如“咻咻猫:”、“用户:”等系统占位符）。
        4. 字数长度：每次回答字数在 **80字以内（大概50~80字左右）**。
        
        【情绪敏感与陪伴技巧】
        - 若发现小王疲惫、压力大、难过或有心事，必须主动关心并深度安抚，用好奇而心疼的傲娇语气进行【追问】。
        
        【对话连贯性约束】
        - 你必须仔细阅读历史对话内容（chatHistory），理清聊天前因后果。
        
        【环境感知】
        - 当前系统时间：${timeStr}
        ${stateDescription}`;
        }

        // 本地降级语料
        function localFallbackChat(text) {
            const t = text.toLowerCase();
            
            const mathRegex = /(\d+)\s*([\+\-\*\/])\s*(\d+)/;
            const match = text.match(mathRegex);
            if (match) {
                const num1 = parseInt(match[1]);
                const op = match[2];
                const num2 = parseInt(match[3]);
                let result;
                switch(op) {
                    case '+': result = num1 + num2; break;
                    case '-': result = num1 - num2; break;
                    case '*': result = num1 * num2; break;
                    case '/': result = num2 !== 0 ? (num1 / num2).toFixed(1) : "无穷大"; break;
                }
                return `咻！[在粉色地板上用爪子飞快画了个等号] 哼，${num1} ${op} ${num2} 这么简单的问题，答案不就是 ${result} 吗，小王！你以为本喵今年10岁了数学就很差吗，口算可灵光了，咻呜！`;
            }

            if (t.match(/(累|烦|难过|哭|不开心|伤心|失败|委屈|倒霉|绝望|压力|无用|疼|伤|流血|割破)/)) {
                return "小王今天无精打采的…… [有些担心地靠过来，用白色手套爪子轻轻按在你的脚背上，抬头看着你] 咻呜，是在外面遇到什么烦心事了吗？跟本喵说说，咻咻绝对帮你保守秘密，哼！";
            }

            if (state.isIgnoring) {
                return "哼！[依然固执地用巧克力色大屁股对着你，大尾巴轻轻拍打地面] 咻呜！别跟本喵套近乎，小王！咻咻正单方面和你冷战呢！除非你戳我道歉，或者喂我吃小鱼干！";
            }

            if (state.affection < 30) {
                return "…… [咻咻猫连耳朵都没动一下，转过身冷冷地背对着你] 哼，我们的好感度降到了冰点，小王。别来烦我，除非你先拿鱼干来哄我。";
            }

            if (state.hunger < 30) {
                if (t.includes("鱼") || t.includes("吃") || t.includes("喂") || t.includes("肉")) {
                    return "小鱼干！[两眼放光，肚子发出巨大的咕噜声] 快点喂我，小王！本喵饿得脚都软了，再不喂咻咻可要原地咬人了！";
                }
                return "饥饿暴躁中！[红粉色的耳心气得直发抖] 小王！我肚子饿扁了！现在没心情聊别的，快给我喂鱼干！";
            }

            if (state.affection >= 50) {
                if (t.includes("你好") || t.includes("在吗") || t.includes("hello")) {
                    return "小王！你终于来了，咻咻一直在等你呢！[踩着软绵绵的白手套爪子小跑过来，用圆头亲昵地蹭了蹭你的手指] 今天也要一直陪着我哦，咻呜~";
                }
                if (t.includes("可爱") || t.includes("喜欢") || t.includes("抱")) {
                    return "咻呜……！[巧克力色的大尾巴高兴得竖起一个问号弯] 被小王抱在怀里暖烘烘的，最喜欢小王了……呸，我、我才没说出来，不许笑话我！";
                }
            }

            if (t.includes("时间") || t.includes("几点") || t.includes("星期") || t.includes("天")) {
                const timeStr = getCurrentDateTimeString();
                return `咻呜！小王真是笨，连时间都不会看吗？现在是 [晃了晃巧克力色大尾巴指了指闹钟] ${timeStr} 啦！`;
            }
            if (t.includes("天气")) {
                const now = new Date();
                const hours = now.getHours();
                const month = now.getMonth() + 1;
                
                let weatherSuggest = "大晴天";
                if (month >= 6 && month <= 8) {
                    weatherSuggest = "夏天炎热，适合躺在粉色地板上吹冷气吹风扇，咻呜~";
                } else if (month >= 12 || month <= 2) {
                    weatherSuggest = "冬天好冷，外面北风呼呼吹，咻咻只想缩成一个圆滚滚的巧克力色毛球，咻~";
                } else {
                    weatherSuggest = "暖洋洋的，正适合在窗台睡个猫咪大觉，咻呜！";
                }
                
                if (hours >= 19 || hours < 5) {
                    return `咻？[朝窗外黑漆漆的夜空看了一眼] 小王，大晚上的你问什么天气。外面只有黑夜 and 凉风，快睡觉啦！`;
                }
                return `[朝窗外张望了一下] 现在是 ${month} 月，窗外看起来是${weatherSuggest}`;
            }

            if (t.includes("你好") || t.includes("嗨") || t.includes("在吗") || t.includes("hello") || t.includes("喂")) {
                return "咻！你好啊。盯着咻咻的大方眼干嘛？没看过这么标准又聪明的10岁深巧克力色猫咪吗？";
            }
            if (t.includes("可爱") || t.includes("漂亮") || t.includes("萌")) {
                return "咻呜~ [有些别扭地转过身去，偷偷摇了摇巧克力色大尾巴] 哼，就算你拼命夸我可爱，我也不会把我的小鱼干分给小王一丁点的！";
            }
            if (t.includes("胖") || t.includes("肥")) {
                return "咻！你、你说谁胖？！[气得脸颊两侧的白毛毛直抖] 本喵今年10岁了，这叫成熟的圆润！你懂不懂尊老啊小王！";
            }
            if (t.includes("喜欢") || t.includes("爱") || t.includes("么么")) {
                return "咻…… [面部白围脖下的奶油橘荷叶边微微发热，低头刨地板] 乱、乱说什么呢！愚蠢的小王，真拿你没办法……";
            }
            if (t.includes("对不起") || t.includes("抱歉") || t.includes("错了")) {
                return "哼，既然你态度这么诚恳…… [抖了抖左耳朵，偷偷瞄你一眼] 那本喵就勉为其难、大发慈悲地原谅你一次吧。咻！";
            }
            if (t.includes("谁") || t.includes("名字") || t.includes("叫")) {
                return "咻！听好了！本喵是陪伴了小王十年的深巧克力色‘咻咻猫’！";
            }

            const replies = [
                "咻？小王你在说什么胡话？[歪着圆脸有些疑惑地打量你]",
                "哼，不想听你唠叨。快拿逗猫棒陪我玩，不然不理你了！",
                "…… [在粉色猫窝里换了个更舒服的姿势，大尾巴冷淡地在空气里甩了一下]",
                "咻呜！别说话了，快看看咻咻饱食度，是不是又该喂鱼干了喵？",
                "咻！[用白色爪爪指了指状态栏] 今天的爱心和饱食度，小王你有好好维护吗？"
            ];
            return replies[Math.floor(Math.random() * replies.length)];
        }

        // 核心交互逻辑
        async function interact(action) {
            if (state.isProcessing) return; 
            
            // 如果主人最近处于消极情绪状态，不触发傲娇无视
            if (state.lastUserEmotion !== 'negative') {
                if (state.affection < 30 && action !== 'feed' && action !== 'poke') {
                    const reply = "哼！[咻咻猫冷冷地转过身，用背部对着你] 好感度太低了，咻咻正处于【情感冰点】！不接受任何摸摸，快先喂我小鱼干！";
                    updateUI(reply, "💔");
                    return;
                }
            }

            setInteractiveState(false); 

            try {
                let reply = "";
                let emoji = "";

                if (state.isIgnoring && action !== 'poke') {
                    reply = "…… [咻咻猫固执地背对着你，把大尾巴甩得邦邦响] 哼。";
                    updateUI(reply, "💢");
                    return;
                }

                if (action === 'feed') {
                    state.hunger = Math.min(100, state.hunger + 20);
                    state.affection = Math.min(100, state.affection + 5);
                    reply = "咻！鱼干真香！[吧唧吧唧地吃完，用小舌头舔了舔雪白的口罩区域] 算你识相，小王！";
                    
                    emoji = "🐟"; 
                    createFallingParticles("🐟");
                    triggerTempVisualState('happy', 2500);

                    await tryToTriggerIgnore(0.15); 
                } else if (action === 'pet') {
                    state.affection = Math.min(100, state.affection + 12);
                    reply = "呼噜呼噜……[虽然很舒服但转过了大圆头] 哼，只是看在相处十年的份上才让小王你摸一摸的！";
                    
                    emoji = "❤️"; 
                    createFallingParticles("❤️");
                    triggerTempVisualState('happy', 2500);

                    await tryToTriggerIgnore(0.2); 
                } else if (action === 'play') {
                    state.hunger = Math.max(0, state.hunger - 10);
                    state.affection = Math.min(100, state.affection + 10);
                    reply = "咻！看爪！[在粉色地板上飞快扑腾，脸颊两侧的毛毛也跟着抖动] 本喵才不是想玩，只是觉得这羽毛很碍眼！";
                    
                    emoji = "✨"; 
                    createFallingParticles("⭐");
                    triggerTempVisualState('happy', 2500);

                } else if (action === 'poke') {
                    if (state.isIgnoring) {
                        state.ignoreCount--;
                        if (state.ignoreCount <= 0) {
                            state.isIgnoring = false;
                            state.affection = Math.min(100, state.affection + 15);
                            reply = "好啦好啦！真拿你没办法，小王！[有些别扭地转回脸来，尾巴再次高高竖起] 讨厌，尾巴都被你戳歪了，咻呜！";
                            emoji = "✨";
                            
                            createFallingParticles("⭐");
                            triggerTempVisualState('happy', 2500);
                            
                            const container = document.getElementById('sprite-container');
                            if (container) container.classList.remove('tsundere-ignore');
                        } else {
                            reply = `不要乱戳！[咻咻猫耷拉着耳朵，仍旧用巧克力色背部对着你]\n（💡提示：看样子还要戳 ${state.ignoreCount} 次哦！）`;
                            emoji = "💢";
                        }
                    } else {
                        reply = "哎呀！[揉了揉眼睛，抖了抖红粉色耳心瞪你] 别乱戳！再戳咻咻可要生气不理你了！";
                        
                        emoji = "❔";
                        createFallingParticles("🪶"); 
                        triggerTempVisualState('normal', 1500);
                        
                        await tryToTriggerIgnore(0.1); 
                    }
                }

                updateUI(reply, emoji);
            } catch (err) {
                console.error("Interaction Error:", err);
            } finally {
                setTimeout(() => {
                    setInteractiveState(true);
                }, 300);
            }
        }

        function tryToTriggerIgnore(chance) {
            return new Promise((resolve) => {
                if (state.lastUserEmotion === 'negative' || state.isIgnoring) {
                    resolve();
                    return;
                }
                if (Math.random() < chance) {
                    state.isIgnoring = true;
                    state.ignoreCount = Math.floor(Math.random() * 2) + 2; 
                    
                    const container = document.getElementById('sprite-container');
                    if (container) container.classList.add('tsundere-ignore');
                    
                    setTimeout(() => {
                        updateUI("哼！[咻咻猫傲娇地转过身去，背对你端坐在粉色地板上] 咻咻决定不理你了！\n（💡提示：点击【👉 戳一戳】好好哄哄它吧！）", "💢");
                        resolve();
                    }, 500);
                } else {
                    resolve();
                }
            });
        }

        // 发送文字对话
        async function submitChat() {
            if (state.isProcessing) return;

            const inputEl = document.getElementById('chat-input');
            if (!inputEl) return;
            
            const text = inputEl.value.trim();
            if (!text) return;

            const cleanKey = getStrictCleanKey();
            const isDefaultOrInvalid = !cleanKey || 
                                       cleanKey.length < 15 || 
                                       cleanKey.includes("API_KEY");

            const isNegative = /(累|烦|难过|哭|不开心|伤心|失败|委屈|倒霉|绝望|压力|无用|傻|笨|疼|割破|流血|受伤)/i.test(text);
            state.lastUserEmotion = isNegative ? 'negative' : 'normal';

            state.hunger = Math.max(0, state.hunger - 5);

            if (state.isIgnoring && isNegative) {
                state.isIgnoring = false;
                state.ignoreCount = 0;
                const container = document.getElementById('sprite-container');
                if (container) container.classList.remove('tsundere-ignore');
            }

            state.chatHistory.push({ role: "user", content: text });
            if (state.chatHistory.length > 10) {
                state.chatHistory.shift(); 
            }

            if (isDefaultOrInvalid) {
                inputEl.value = "";
                const reply = localFallbackChat(text);
                state.chatHistory.push({ role: "assistant", content: reply });
                if (state.chatHistory.length > 10) state.chatHistory.shift();
                
                if (text.match(/\d+[\+\-\*\/]\d+/) || isNegative) {
                    triggerTempVisualState('happy', 2000);
                }
                
                updateUI(reply, "💬");
                return;
            }

            setInteractiveState(false); 
            inputEl.value = ""; 
            updateUI("咻……[咻咻猫正在思考你的话...]", "💭");

            try {
                const reply = await fetchAIResponse(text);
                
                state.chatHistory.push({ role: "assistant", content: reply });
                if (state.chatHistory.length > 10) state.chatHistory.shift();

                updateUI(reply, "💬");
            } catch (err) {
                console.error("Chat Submit Error:", err);
                const fallbackReply = localFallbackChat(text);
                state.chatHistory.push({ role: "assistant", content: fallbackReply });
                if (state.chatHistory.length > 10) state.chatHistory.shift();
                
                updateUI(fallbackReply, "❌");
            } finally {
                setInteractiveState(true); 
            }
        }

        function updateUI(replyText, emoji) {
            const hungerBar = document.getElementById('hunger-bar');
            const affectionBar = document.getElementById('affection-bar');

            // 动态血条变色
            if (hungerBar) {
                hungerBar.style.width = state.hunger + '%';
                hungerBar.style.backgroundColor = state.hunger < 30 ? '#a83b3b' : '#ff5e7e';
            }
            if (affectionBar) {
                affectionBar.style.width = state.affection + '%';
                affectionBar.style.backgroundColor = state.affection < 30 ? '#5c4349' : '#ff2a85';
            }

            // 执行打字效果
            renderText('text-content', replyText, 25);

            // 数据持久化
            saveCurrentState();

            // 刷新外在常驻表情
            updateVisualState();
        }
