<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咻咻猫的 16-bit 智能猫窝</title>
    <style>
        /* 全局复古游戏机风格 */
        body {
            background-color: #2c211a;
            font-family: "Courier New", Courier, monospace, "Microsoft YaHei";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        #game-console {
            width: 420px;
            background: #ab825f; 
            border: 6px solid #4e3522;
            border-radius: 16px;
            box-shadow: 0 12px 0 #2c1c11, 0 20px 30px rgba(0,0,0,0.6);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* 浅粉色纯色渐变背景 */
        #game-screen {
            background: linear-gradient(to bottom, #ffe4eb, #fbc4d0); 
            border: 6px solid #4e3522;
            border-radius: 8px;
            height: 280px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(188,120,135,0.4);
        }

        /* CRT 显像管扫描线效果 */
        #game-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 5;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
        }

        /* 状态面板 */
        #status-bars {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .bar-container {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 0px #4e3522, -1px -1px 0px #4e3522, 1px -1px 0px #4e3522, -1px 1px 0px #4e3522;
        }

        .bar-label {
            display: flex;
            align-items: center;
            gap: 6px;                
            white-space: nowrap;     
            min-width: 65px;         
            margin-right: 5px;       
        }
        
        .pixel-bar-bg {
            width: 90px;
            height: 14px;
            background: #e9ced5;
            border: 3px solid #4e3522;
        }

        .pixel-bar-fill {
            height: 100%;
            width: 60%;
            transition: width 0.3s, background-color 0.5s;
        }

        /* 精灵图容器 */
        #sprite-container {
            position: absolute;
            bottom: 10px;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sprite-container.tsundere-ignore {
            transform: scaleX(-1);
        }

        /* ------------------------------------------
           🎬 四种情绪姿态的 16-bit 像素动画系统 
           ------------------------------------------ */
        
        /* 1. 默认正常状态：3.5秒平缓呼吸 */
        #sprite-container.state-normal svg.cat-sprite {
            animation: breathe-normal 3.5s infinite ease-in-out;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-normal {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.03, 0.97) translateY(2px); }
        }

        /* 2. 犯困状态：5秒超慢呼吸 */
        #sprite-container.state-sleepy svg.cat-sprite {
            animation: breathe-sleepy 5s infinite ease-in-out;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-sleepy {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.01, 0.99) translateY(1px); }
        }

        /* 3. 生气暴躁状态：1.5秒急促呼吸 + 震颤摇晃 */
        #sprite-container.state-angry svg.cat-sprite {
            animation: breathe-angry 1.5s infinite ease-in-out, shake-angry 0.15s infinite alternate;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-angry {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.04, 0.96) translateY(2px); }
        }
        @keyframes shake-angry {
            0% { transform: translate(-1px, 0) rotate(-0.5deg); }
            100% { transform: translate(1px, 0) rotate(0.5deg); }
        }

        /* 4. 开心状态：2秒雀跃起伏 + 上下弹跳 */
        #sprite-container.state-happy svg.cat-sprite {
            animation: breathe-happy 2s infinite ease-in-out, bounce-happy 1s infinite alternate;
            shape-rendering: crispEdges;
        }
        @keyframes breathe-happy {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05, 0.95) translateY(1px); }
        }
        @keyframes bounce-happy {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); } 
        }

        /* 强制重置所有特殊表情图层，规避浏览器渲染引擎的 display 转换冲突 */
        .eye-sleepy, .eye-angry, .eyebrow-angry, .eye-happy, 
        .ear-sleepy, .ear-angry, .blush-happy {
            display: none !important;
        }

        /* 犯困状态强制显示 */
        #sprite-container.state-sleepy .eye-sleepy,
        #sprite-container.state-sleepy .ear-sleepy { display: inline !important; }
        #sprite-container.state-sleepy .eye-open,
        #sprite-container.state-sleepy .eye-open-pupil,
        #sprite-container.state-sleepy .ear-normal { display: none !important; }

        /* 生气状态强制显示 */
        #sprite-container.state-angry .eye-angry,
        #sprite-container.state-angry .eyebrow-angry,
        #sprite-container.state-angry .ear-angry { display: inline !important; }
        #sprite-container.state-angry .eye-open,
        #sprite-container.state-angry .eye-open-pupil,
        #sprite-container.state-angry .ear-normal { display: none !important; }

        /* 开心撒娇状态强制显示 */
        #sprite-container.state-happy .eye-happy,
        #sprite-container.state-happy .blush-happy { display: inline !important; }
        #sprite-container.state-happy .eye-open,
        #sprite-container.state-happy .eye-open-pupil { display: none !important; }


        /* 优化后的对话框布局 */
        #dialogue-box {
            background: #1a1512;
            border: 4px solid #fff;
            outline: 2px solid #1a1512;
            border-radius: 4px;
            height: 110px;
            padding: 8px 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #speaker {
            font-size: 11px;
            color: #ff99bb; 
            font-weight: bold;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        /* 自适应像素滚动对话栏 */
        #text-content {
            font-size: 13px;
            line-height: 1.4;
            color: #ffd1dc; 
            overflow-y: auto; 
            flex-grow: 1;
        }

        /* 🎨 16-bit 专属复古风滚动条美化 */
        #text-content::-webkit-scrollbar {
            width: 6px;
        }
        #text-content::-webkit-scrollbar-track {
            background: #1a1512;
        }
        #text-content::-webkit-scrollbar-thumb {
            background: #ab825f;
            border: 1px solid #4e3522;
            border-radius: 2px;
        }

        #buttons-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .pixel-btn {
            background: #e29bb2; 
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #3b1d27;
            font-size: 11px;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: inset -2px -2px 0px #b06e83, 2px 2px 0px #4e3522;
            outline: none;
        }

        .pixel-btn:active:not(:disabled) {
            box-shadow: inset 2px 2px 0px #b06e83;
            transform: translate(1px, 1px);
        }

        /* 禁用时的像素置灰样式 */
        .pixel-btn:disabled {
            background: #a0828c !important;
            border-color: #5a4b40 !important;
            color: #605058 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }

        #btn-poke {
            background: #84bbf0;
            border-color: #2b4562;
            box-shadow: inset -2px -2px 0px #508cb5, 2px 2px 0px #2b4562;
            color: #fff;
        }

        #chat-input-area {
            display: flex;
            gap: 6px;
        }

        #chat-input {
            flex: 1;
            background: #1a1512;
            border: 3px solid #4e3522;
            border-radius: 4px;
            color: #fff;
            padding: 8px;
            font-size: 12px;
            outline: none;
        }

        #chat-submit {
            background: #e8517b;
            color: white;
            border: 3px solid #a62a4d;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        /* 气泡文字特效样式 */
        .emoji-effect {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            z-index: 99;
            animation: fadeFloatUp 1s ease-out forwards;
        }

        @keyframes fadeFloatUp {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
            20% { opacity: 1; transform: translate(-50%, -80%) scale(1.1); }
            100% { transform: translate(-50%, -160%) scale(0.8); opacity: 0; }
        }
    </style>
</head>

        <div id="dialogue-box">

    <script>
        // ==========================================
        // ⚙️ 接口配置
        // ==========================================
        var CONFIG = {
            apiKey: localStorage.getItem('xiuxiu_api_key') || "", 
            apiUrl: "https://api.siliconflow.cn/v1", 
            apiModel: "Qwen/Qwen2.5-7B-Instruct"     
        };

        // ==========================================
        // 💾 结构化记忆管理器 (MemoryManager) - 满足需求 2 (重要记忆永久，普通记忆滚动淘汰)
        // ==========================================
        var MemoryManager = {
            getMemory: function() {
                try {
                    return JSON.parse(localStorage.getItem('xiuxiu_structured_memory') || '{"core":{"ownerName":"","occupation":"","longTermPrefs":[]},"common":[]}');
                } catch(e) {
                    return { core: { ownerName: "", occupation: "", longTermPrefs: [] }, common: [] };
                }
            },
            saveMemory: function(memObj) {
                localStorage.setItem('xiuxiu_structured_memory', JSON.stringify(memObj));
            },
            addCoreMemory: function(key, value) {
                var mem = this.getMemory();
                if (key === 'ownerName') {
                    mem.core.ownerName = value;
                } else if (key === 'occupation') {
                    mem.core.occupation = value;
                } else if (key === 'longTermPrefs') {
                    // 防止重复存入
                    var exists = false;
                    for (var i = 0; i < mem.core.longTermPrefs.length; i++) {
                        if (mem.core.longTermPrefs[i].toLowerCase() === value.toLowerCase()) {
                            exists = true;
                            break;
                        }
                    }
                    if (!exists) {
                        mem.core.longTermPrefs.push(value);
                    }
                }
                this.saveMemory(mem);
                console.log("💾 已存入核心记忆 (" + key + "): " + value);
            },
            addCommonMemory: function(fact) {
                var mem = this.getMemory();
                var exists = false;
                for (var i = 0; i < mem.common.length; i++) {
                    if (mem.common[i].toLowerCase() === fact.toLowerCase()) {
                        exists = true;
                        break;
                    }
                }
                if (!exists) {
                    mem.common.push(fact);
                    // 普通记忆最大限制为 5 个，超出时按 FIFO 滚动淘汰
                    if (mem.common.length > 5) {
                        var removed = mem.common.shift();
                        console.log("🗑️ 普通记忆超出上限，淘汰淘汰: " + removed);
                    }
                    this.saveMemory(mem);
                    console.log("📝 已存入普通记忆: " + fact);
                }
            },
            getMemoryPrompt: function() {
                var mem = this.getMemory();
                var lines = [];
                lines.push("【关于主人的重要记忆（永久保留）】：");
                lines.push("- 姓名：" + (mem.core.ownerName || "未知"));
                lines.push("- 职业：" + (mem.core.occupation || "未知"));
                if (mem.core.longTermPrefs.length > 0) {
                    lines.push("- 长期偏好：" + mem.core.longTermPrefs.join("、"));
                } else {
                    lines.push("- 长期偏好：暂无记录");
                }
                lines.push("【关于主人的普通记忆（动态滚动淘汰）】：");
                if (mem.common.length > 0) {
                    for (var i = 0; i < mem.common.length; i++) {
                        lines.push("- " + mem.common[i]);
                    }
                } else {
                    lines.push("- 暂无日常记忆。");
                }
                return lines.join('\n');
            }
        };

        // 🧠 记忆读取与游戏状态存档加载 (使用 v7 保持存档一致)
        function loadSavedState() {
            try {
                var saved = localStorage.getItem('xiuxiu_pet_state_v7');
                if (saved) {
                    var parsed = JSON.parse(saved);
                    return {
                        hunger: parsed.hunger !== undefined ? parsed.hunger : 60,
                        affection: parsed.affection !== undefined ? parsed.affection : 60,
                        isIgnoring: parsed.isIgnoring !== undefined ? parsed.isIgnoring : false,
                        ignoreCount: parsed.ignoreCount !== undefined ? parsed.ignoreCount : 0,
                        isProcessing: false,
                        chatHistory: parsed.chatHistory || [],
                        summary: parsed.summary || "", 
                        lastUserEmotion: parsed.lastUserEmotion || 'normal'
                    };
                }
            } catch (e) {
                console.error("读取存档失败，启用全新状态:", e);
            }
            return {
                hunger: 60,
                affection: 60,
                isIgnoring: false,  
                ignoreCount: 0,
                isProcessing: false,
                chatHistory: [],
                summary: "",
                lastUserEmotion: 'normal'
            };
        }

        // 初始化状态
        var state = loadSavedState();

        // 🧠 写入存档 (使用 v7)
        function saveCurrentState() {
            try {
                var toSave = {
                    hunger: state.hunger,
                    affection: state.affection,
                    isIgnoring: state.isIgnoring,
                    ignoreCount: state.ignoreCount,
                    chatHistory: state.chatHistory,
                    summary: state.summary,
                    lastUserEmotion: state.lastUserEmotion
                };
                localStorage.setItem('xiuxiu_pet_state_v7', JSON.stringify(toSave));
            } catch (e) {

        // ==========================================
        // 🌊 原生流式请求渲染器 (Streaming) - 满足需求 4 (使用 response.body.getReader 真流式)
        // ==========================================
        async function fetchAIResponseStream(userMessage, onChunk, onDone, onError) {
            var cleanKey = getStrictCleanKey();

            // 离线单机模式下模拟流式打字输出（打字效果仅在单机时作为模拟体验）
            if (!cleanKey || cleanKey.length < 15 || cleanKey.includes("API_KEY")) {
                var reply = localFallbackChat(userMessage);
                var currentText = "";
                var i = 0;
                var interval = setInterval(function() {
                    if (i < reply.length) {
                        currentText += reply.charAt(i);
                        onChunk(currentText);
                        i++;
                    } else {
                        clearInterval(interval);
                        onDone(reply);
                    }
                }, 30);
                return;
            }

            var controller = new AbortController();
            var timeoutId = setTimeout(function() { 
                controller.abort(); 
            }, 12000); 

            var messagesPayload = [
                { role: "system", content: getSystemPrompt() }
            ];
            for (var j = 0; j < state.chatHistory.length; j++) {
                messagesPayload.push(state.chatHistory[j]);
            }

            try {
                var response = await fetch(CONFIG.apiUrl + "/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + cleanKey
                    },
                    body: JSON.stringify({
                        model: CONFIG.apiModel,
                        messages: messagesPayload,
                        max_tokens: 180, 
                        temperature: 0.6,
                        stream: true // 开启流式参数
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    var errText = await response.text();
                    throw new Error("[HTTP " + response.status + "] - " + errText);
                }

                // 🌟 安全兜底：如果运行平台不支持 ReadableStream，自动安全降级到常规 HTTP
                if (!response.body || !response.body.getReader) {
                    var fallbackData = await response.json();
                    var fallbackContent = fallbackData.choices[0].message.content || "";
                    onChunk(fallbackContent);
                    onDone(fallbackContent);
                    return;
                }

                // 🎮 核心：利用 response.body.getReader() 进行逐块真·流式渲染
                var reader = response.body.getReader();
                var decoder = new TextDecoder("utf-8");
                var buffer = "";
                var fullText = "";

                while (true) {
                    var result = await reader.read();
                    if (result.done) {
                        onDone(fullText);
                        break;
                    }

                    buffer += decoder.decode(result.value, { stream: true });
                    var lines = buffer.split("\n");
                    buffer = lines.pop(); 

                    for (var k = 0; k < lines.length; k++) {
                        var cleanLine = lines[k].trim();
                        if (!cleanLine) continue;
                        if (cleanLine === "data: [DONE]") continue;
                        if (cleanLine.indexOf("data: ") === 0) {
                            try {
                                var json = JSON.parse(cleanLine.slice(6));
                                var chunk = json.choices[0].delta.content || "";
                                if (chunk) {
                                    fullText += chunk;
                                    // 动态过滤流式中未输出完全的 [MEM... 标签，对用户绝对隐形，防止闪烁
                                    var cleanChunk = fullText
                                        .replace(/\[(CORE_MEM|COMMON_MEM):.*?\]/g, "")
                                        .replace(/\[(CORE_MEM|COMMON_MEM|CO|COMM)?:?.*/g, "");
                                    onChunk(cleanChunk);
                                }
                            } catch (e) {
                                // 忽略解析异常
                            }
                        }
                    }
                }
            } catch (err) {
                clearTimeout(timeoutId);
                onError(err);
            }
        }

                    var coreRegex = /\[CORE_MEM:\s*(\w+)\s*=\s*(.*?)\]/g;
                    var match;
                    while ((match = coreRegex.exec(fullResponse)) !== null) {
                        if (match[1] && match[2]) {
                            MemoryManager.addCoreMemory(match[1].trim(), match[2].trim());
                        }
                    }

                    var commonRegex = /\[COMMON_MEM:\s*(.*?)\]/g;
                    while ((match = commonRegex.exec(fullResponse)) !== null) {
                        if (match[1]) {
                            MemoryManager.addCommonMemory(match[1].trim());
                        }
                    }

                    // 剥离所有记忆标签，呈现最纯净的台词给用户
                    var finalCleanText = fullResponse
                        .replace(/\[CORE_MEM:.*?\]/g, "")
                        .replace(/\[COMMON_MEM:.*?\]/g, "")
                        .trim();

                    addChatHistory("assistant", finalCleanText);
                    updateUI(finalCleanText, "💬");
                    setInteractiveState(true);

                    // 在后台默默执行滚动连续总结
                    await summarizeOldHistory();
                },
                async function(err) {
                    console.error("Stream Submit Error:", err);
                    var fallbackReply = localFallbackChat(text);
                    addChatHistory("assistant", fallbackReply);
                    updateUI(fallbackReply, "❌");
                    setInteractiveState(true);
                }
            );
        }
